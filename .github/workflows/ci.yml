name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  js:
    name: JS/TS (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  conformance:
    name: Conformance (canonicalization, native == wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo build -p hfp-cli --release
      - run: cargo build -p hfp-cli --release --target wasm32-wasip1
      - run: node conformance/run.mjs

  verify:
    name: Verify corpus (CMS, CA whitelist, revocation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo build -p hfp-cli --release
      - run: bash conformance/verify/gen-pki.sh
      - run: node conformance/verify/build-cases.mjs
      - run: node conformance/verify/run-verify.mjs
